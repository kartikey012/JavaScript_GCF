<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var a=window.prompt("Enter a number:")
        var b=1
        do{
          document.write(a+"*"+b+"="+ a*b +"<br>") 
          b++
        }while(b<=10);
    </script>
</body>
</html>
