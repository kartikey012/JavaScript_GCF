<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var n=window.prompt("enter a number.")
    
    for(var a=1;a<=10;a++)
    {
        if((a*n)%2==0)
    {
        document.write("Number is Even.<br>")
    }
    else{
        document.write("Number is Odd.<br>")
    }
        document.write(n+"*"+ a+"="+ a*n +"<br>")
        
    }
    
    </script>
</body>
</html>
