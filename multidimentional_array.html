<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let matrix = [
            [10, 20, 30],
            [40, 50, 60],
            [70, 80, 90]
        ];
       
        console.log("First element:", matrix[0][0]); // 10
        console.log("Last element:", matrix[2][2]); // 90
        
        for (let i=0; i < matrix.length; i++) {
            for (let j = 0 ;j < matrix[i].length; j++) {
                document.write(matrix[i][j] + " ");
            }
            document.write("<br>");
        }
    </script>
</body>

</html>
