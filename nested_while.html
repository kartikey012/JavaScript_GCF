<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var a=1
        while(a<=10)
    {
        var b=1
        while(b<=10){
           document.write(a+"*"+b+"=" + a*b+"<br>")
           b++
        }
        document.write("<hr>")
        a++
    }
    </script>
</body>
</html>
