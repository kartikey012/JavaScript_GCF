<!DOCTYPE html>
<html>
<body>

<script>

// ==========================
// 1. STRING INITIALIZATION
// ==========================
let str1 = "Hello";        // double quotes
let str2 = 'World';        // single quotes

console.log("String 1:", str1);
console.log("String 2:", str2);

// ==========================
// 2. SINGLE vs DOUBLE QUOTES (NESTING)
// ==========================

// Double outside, single inside
let msg1 = "He said 'Hello'";
console.log(msg1);
document.write(msg1 + "<br>");

// Single outside, double inside
let msg2 = 'She said "Hi"';
console.log(msg2);
document.write(msg2 + "<br>");

// Wrong (will give error)
// let msg3 = "He said "Hello""; ❌

// ==========================
// 3. STRING OPERATIONS
// ==========================
let text = "JavaScript";

console.log("Length of given string is :", text.length); 
console.log("Uppercase:", text.toUpperCase());
console.log("Lowercase:", text.toLowerCase());
console.log("Substring:", text.substring(0,4));
console.log("Replace:", text.replace("Java", "Type"));
document.write("Length of given string is :", text.length, "<br>");
document.write("Uppercase:", text.toUpperCase(), "<br>");
document.write("Lowercase:", text.toLowerCase(), "<br>");
document.write("Substring:", text.substring(0,4), "<br>");
document.write("Substr:", text.substr(4,5), "<br>");
document.write("Replace:", text.replace("Java", "Type"), "<br>");
document.write("Concatenation:", text + " Language", "<br>");

// ==========================
// 4. eval() FUNCTION
// ==========================
// Evaluates string as JavaScript code

let exp = "10 + 5 * 2";
let result = eval(exp);

console.log("Eval Result:", result); // 20
document.write("Eval Result:", result, "<br>");
// ⚠️ Warning: eval() is risky,avoid in real apps

// ==========================
// 5. toFixed()
// ==========================
// Rounds number to fixed decimals

let num1 = 12.34567;
console.log("toFixed(2):", num1.toFixed(2)); // 12.35
document.write("toFixed(2):", num1.toFixed(2), "<br>");

// ==========================
// 6. toLocaleString()
// ==========================
// Formats number based on locale

let num2 = 1234567.89;

console.log("US Format:", num2.toLocaleString("en-US"));
console.log("India Format:", num2.toLocaleString("en-IN"));
document.write("US Format:", num2.toLocaleString("en-US"), "<br>");
document.write("India Format:", num2.toLocaleString("en-IN"), "<br>");

// ==========================
// 7. toPrecision()
// ==========================
// Formats number to specified total digits

let num3 = 123.456;

console.log("toPrecision(4):", num3.toPrecision(4)); // 123.5
console.log("toPrecision(2):", num3.toPrecision(2)); // 1.2e+2
document.write("toPrecision(4):", num3.toPrecision(4), "<br>");
document.write("toPrecision(2):", num3.toPrecision(2), "<br>");

</script>

</body>
</html>
